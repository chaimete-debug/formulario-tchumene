<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <meta name="theme-color" content="#111111">

  <meta
    name="description"
    content="Formulário da Igreja do Nazareno em Tchumene."
  >

  <meta
    name="application-name"
    content="Nazareno Tchumene"
  >

  <!-- Manifesto da PWA -->
  <link rel="manifest" href="manifest.webmanifest">

  <!-- Ícones -->
  <link
    rel="icon"
    type="image/png"
    sizes="32x32"
    href="icons/favicon-32.png"
  >

  <link
    rel="apple-touch-icon"
    sizes="180x180"
    href="icons/apple-touch-icon.png"
  >

  <!-- Configuração para iPhone e iPad -->
  <meta
    name="apple-mobile-web-app-capable"
    content="yes"
  >

  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="default"
  >

  <meta
    name="apple-mobile-web-app-title"
    content="Nazareno Tchumene"
  >

  <title>
    Formulário — Igreja do Nazareno em Tchumene
  </title>

  <style>
    :root {
      color-scheme: light;

      --bg: #f3f3f3;
      --card: #ffffff;
      --text: #111111;
      --muted: #666666;
      --primary: #111111;
      --primary-text: #ffffff;
      --secondary: #ffffff;
      --shadow: 0 14px 40px rgba(0, 0, 0, 0.10);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100vh;
      margin: 0;

      padding:
        max(24px, env(safe-area-inset-top))
        max(18px, env(safe-area-inset-right))
        max(24px, env(safe-area-inset-bottom))
        max(18px, env(safe-area-inset-left));

      display: grid;
      place-items: center;

      background:
        radial-gradient(
          circle at top,
          #ffffff 0,
          #f3f3f3 55%,
          #ebebeb 100%
        );

      color: var(--text);

      font-family:
        Inter,
        ui-sans-serif,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        Helvetica,
        Arial,
        sans-serif;
    }

    main {
      width: min(100%, 520px);
    }

    .card {
      overflow: hidden;

      background: var(--card);
      border: 1px solid rgba(0, 0, 0, 0.07);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .brand {
      padding: 26px 28px 20px;
      text-align: center;
    }

    .brand img {
      display: block;

      width: min(100%, 360px);
      height: auto;

      margin: 0 auto 18px;
    }

    .eyebrow {
      margin: 0 0 7px;

      color: var(--muted);

      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;

      font-size: clamp(1.55rem, 5vw, 2.15rem);
      line-height: 1.12;
    }

    .actions {
      display: grid;
      gap: 14px;

      padding: 14px 28px 30px;
    }

    button,
    .button {
      width: 100%;
      min-height: 60px;

      padding: 15px 18px;

      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;

      border: 1px solid var(--primary);
      border-radius: 14px;

      font: inherit;
      font-size: 1.04rem;
      font-weight: 750;
      text-align: center;
      text-decoration: none;

      cursor: pointer;

      transition:
        transform 120ms ease,
        box-shadow 120ms ease,
        opacity 120ms ease;
    }

    button:active,
    .button:active {
      transform: translateY(1px);
    }

    .primary {
      background: var(--primary);
      color: var(--primary-text);

      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.18);
    }

    .secondary {
      background: var(--secondary);
      color: var(--text);
    }

    [hidden] {
      display: none !important;
    }

    .status {
      min-height: 24px;
      margin: 2px 0 0;

      color: var(--muted);

      font-size: 0.92rem;
      line-height: 1.45;
      text-align: center;
    }

    .footer {
      margin: 16px 0 0;

      color: #777777;

      font-size: 0.8rem;
      text-align: center;
    }

    @media (max-width: 420px) {
      .brand,
      .actions {
        padding-left: 20px;
        padding-right: 20px;
      }

      button,
      .button {
        min-height: 62px;
        font-size: 1.06rem;
      }
    }
  </style>
</head>

<body>
  <main>

    <section
      class="card"
      aria-labelledby="page-title"
    >

      <div class="brand">

        <img
          src="emblema-completo.png"
          alt="Emblema da Igreja do Nazareno"
          width="909"
          height="682"
        >

        <p class="eyebrow">
          Igreja do Nazareno em Tchumene
        </p>

        <h1 id="page-title">
          Formulário da Igreja
        </h1>

      </div>

      <div class="actions">

        <button
          id="install-button"
          class="primary"
          type="button"
        >
          <span aria-hidden="true">⬇</span>
          Instalar no telefone
        </button>

        <a
          id="open-form"
          class="button secondary"
          href="https://ee-eu.kobotoolbox.org/x/phsELa2l"
        >
          <span aria-hidden="true">📝</span>
          Abrir formulário
        </a>

        <p
          id="status"
          class="status"
          role="status"
          aria-live="polite"
        ></p>

      </div>

    </section>

    <p class="footer">
      Igreja do Nazareno em Tchumene
    </p>

  </main>

  <script>
    /*
     * Endereço público da PWA.
     */
    const PUBLIC_APP_URL =
      "https://formulario-tchumene.vercel.app/";

    /*
     * Elementos da página.
     */
    const installButton =
      document.getElementById("install-button");

    const statusText =
      document.getElementById("status");

    /*
     * Pedido de instalação fornecido pelo navegador.
     */
    let deferredInstallPrompt = null;

    /*
     * Verifica se a página foi aberta como aplicação instalada.
     */
    function isApplicationInstalled() {
      return (
        window.matchMedia("(display-mode: standalone)").matches ||
        window.navigator.standalone === true
      );
    }

    /*
     * Verifica se está a ser usado o Samsung Internet.
     */
    function isSamsungInternet() {
      return /SamsungBrowser/i.test(
        window.navigator.userAgent
      );
    }

    /*
     * Verifica se o dispositivo utiliza Android.
     */
    function isAndroidDevice() {
      return /Android/i.test(
        window.navigator.userAgent
      );
    }

    /*
     * Cria o endereço especial que abre esta página
     * directamente no Google Chrome.
     *
     * Caso o Chrome não esteja disponível, o navegador
     * regressa à página com o parâmetro chrome=indisponivel.
     */
    function buildChromeIntentUrl() {
      const fallbackUrl =
        encodeURIComponent(
          PUBLIC_APP_URL + "?chrome=indisponivel"
        );

      return (
        "intent://formulario-tchumene.vercel.app/" +
        "#Intent;" +
        "scheme=https;" +
        "package=com.android.chrome;" +
        "action=android.intent.action.VIEW;" +
        "category=android.intent.category.BROWSABLE;" +
        "S.browser_fallback_url=" +
        fallbackUrl +
        ";" +
        "end;"
      );
    }

    /*
     * Abre a PWA no Google Chrome.
     */
    function openPageInChrome() {
      statusText.textContent = "A abrir...";

      window.location.href =
        buildChromeIntentUrl();
    }

    /*
     * Aguarda brevemente pelo pedido de instalação.
     *
     * Em alguns telefones, o pedido pode demorar alguns
     * segundos depois de a página abrir.
     */
    function waitForInstallPrompt(timeoutMilliseconds) {
      return new Promise(function (resolve) {
        if (deferredInstallPrompt) {
          resolve(deferredInstallPrompt);
          return;
        }

        const startTime = Date.now();

        const interval = window.setInterval(
          function () {
            if (deferredInstallPrompt) {
              window.clearInterval(interval);
              resolve(deferredInstallPrompt);
              return;
            }

            if (
              Date.now() - startTime >=
              timeoutMilliseconds
            ) {
              window.clearInterval(interval);
              resolve(null);
            }
          },
          100
        );
      });
    }

    /*
     * Apresenta o estado da aplicação instalada.
     */
    function applyInstalledState() {
      installButton.hidden = true;

      statusText.textContent =
        "Aplicação instalada.";
    }

    /*
     * Apresenta o estado normal no navegador.
     */
    function applyBrowserState() {
      installButton.hidden = false;

      const parameters =
        new URLSearchParams(window.location.search);

      const chromeUnavailable =
        parameters.get("chrome") ===
        "indisponivel";

      if (chromeUnavailable) {
        statusText.textContent =
          "Não foi possível instalar. Use “Abrir formulário”.";
      } else {
        statusText.textContent = "";
      }
    }

    /*
     * Guarda o pedido de instalação fornecido
     * pelo navegador.
     */
    window.addEventListener(
      "beforeinstallprompt",
      function (event) {
        event.preventDefault();

        deferredInstallPrompt = event;

        if (!isApplicationInstalled()) {
          installButton.hidden = false;
          statusText.textContent = "";
        }
      }
    );

    /*
     * Clique no botão "Instalar no telefone".
     */
    installButton.addEventListener(
      "click",
      async function () {

        /*
         * No Samsung Internet, abre a mesma página
         * no Google Chrome.
         */
        if (
          isSamsungInternet() &&
          isAndroidDevice()
        ) {
          openPageInChrome();
          return;
        }

        /*
         * Aguarda até três segundos pelo pedido
         * de instalação do navegador.
         */
        statusText.textContent =
          "A preparar instalação...";

        const installPrompt =
          deferredInstallPrompt ||
          await waitForInstallPrompt(3000);

        /*
         * Quando o navegador não permite a instalação.
         */
        if (!installPrompt) {
          statusText.textContent =
            "Não foi possível instalar. Use “Abrir formulário”.";

          return;
        }

        try {
          installPrompt.prompt();

          const choice =
            await installPrompt.userChoice;

          if (choice.outcome === "accepted") {
            statusText.textContent =
              "Aplicação instalada.";

            installButton.hidden = true;
          } else {
            statusText.textContent =
              "Use “Abrir formulário”.";
          }

        } catch (error) {
          console.error(
            "Erro durante a instalação:",
            error
          );

          statusText.textContent =
            "Não foi possível instalar. Use “Abrir formulário”.";
        }

        deferredInstallPrompt = null;
      }
    );

    /*
     * Confirmação da instalação.
     */
    window.addEventListener(
      "appinstalled",
      function () {
        deferredInstallPrompt = null;
        applyInstalledState();
      }
    );

    /*
     * Define o estado inicial.
     */
    if (isApplicationInstalled()) {
      applyInstalledState();
    } else {
      applyBrowserState();
    }

    /*
     * Detecta a passagem para o modo instalado.
     */
    const standaloneMediaQuery =
      window.matchMedia(
        "(display-mode: standalone)"
      );

    function handleDisplayModeChange(event) {
      if (event.matches) {
        applyInstalledState();
      }
    }

    if (
      typeof standaloneMediaQuery.addEventListener ===
      "function"
    ) {
      standaloneMediaQuery.addEventListener(
        "change",
        handleDisplayModeChange
      );
    } else if (
      typeof standaloneMediaQuery.addListener ===
      "function"
    ) {
      standaloneMediaQuery.addListener(
        handleDisplayModeChange
      );
    }

    /*
     * Registo do Service Worker.
     *
     * O parâmetro v=4 ajuda o navegador a reconhecer
     * esta versão actualizada.
     */
    if ("serviceWorker" in navigator) {
      window.addEventListener(
        "load",
        function () {
          navigator.serviceWorker
            .register("service-worker.js?v=4")
            .catch(function (error) {
              console.error(
                "Erro no Service Worker:",
                error
              );
            });
        }
      );
    }
  </script>
</body>
</html>
