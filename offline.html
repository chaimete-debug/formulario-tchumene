<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#111111">
  <title>Sem ligação — Nazareno Tchumene</title>
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      display: grid;
      place-items: center;
      background: #f3f3f3;
      color: #111111;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
    }
    main {
      width: min(100%, 430px);
      padding: 30px;
      background: #ffffff;
      border-radius: 22px;
      box-shadow: 0 14px 40px rgba(0,0,0,.10);
    }
    img {
      width: 110px;
      height: 110px;
      object-fit: contain;
    }
    h1 {
      margin: 18px 0 10px;
    }
    p {
      color: #666666;
      line-height: 1.55;
    }
    button {
      min-height: 50px;
      margin-top: 10px;
      padding: 12px 22px;
      border: 0;
      border-radius: 13px;
      background: #111111;
      color: #ffffff;
      font: inherit;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <img src="icons/icon-192.png" alt="">
    <h1>Sem ligação à Internet</h1>
    <p>
      Não foi possível abrir o formulário. Verifique a ligação e tente novamente.
    </p>
    <button type="button" onclick="location.reload()">Tentar novamente</button>
  </main>
</body>
</html>
